<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>SSAI — Journey (Lens A · Documentary Realism)</title>
<style>
  html,body{margin:0;padding:0;height:100%;background:#05060a;overflow:hidden;}
  #c{position:fixed;inset:0;width:100vw;height:100vh;display:block;}
  /* very restrained vignette so the void reads as deep space, premium and quiet */
  #vig{position:fixed;inset:0;pointer-events:none;
    background:radial-gradient(ellipse 130% 100% at 50% 50%, rgba(5,6,10,0) 55%, rgba(3,3,10,0.5) 100%);}
</style>
<script type="importmap">
{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js"}}
</script>
</head>
<body>
<canvas id="c"></canvas>
<div id="vig"></div>

<script type="module">
import * as THREE from 'three';

/* ============================================================================
   SSAI — CINEMATIC BACKGROUND FLIGHT  ·  journey-A
   LENS A — DOCUMENTARY REALISM
   ----------------------------------------------------------------------------
   A deep-space starfield with three real bodies — MARS, MOON, EARTH — sitting
   in a vast black. One SUN directional light gives every body a true day/night
   terminator. The camera flies a slow, majestic, scroll-linked journey:
   Mars (full → receding disc) → cross the void → Moon (grows, close) →
   pull back → approach Earth until, at p=1.0, Earth fills the frame, centred,
   on its ATLANTIC / AFRICA face — ready to crossfade into a MapLibre globe
   centred near lng -42, lat 18.

   Public API:
     window.setJourneyProgress(p)   // p in 0..1 drives the camera
     window.__journey = { scene, camera, planets:{mars,moon,earth} }
   ============================================================================ */

// ---- brand palette ----------------------------------------------------------
const BG     = 0x05060a;   // deep-space near-black
const TEAL   = 0x2fd9c3;
const BLUE   = 0x3c7be0;
const STAR   = 0xf4f5ff;   // off-white

// textures already on disk — EXACT relative paths (do not change)
const TEX = {
  mars:        '../assets/images/scenes/journey/mars-sphere.jpg',
  moon:        '../assets/images/scenes/journey/moon-sphere.jpg',
  earthDay:    '../assets/images/scenes/journey/earth-day.jpg',
  earthNight:  '../assets/images/scenes/journey/earth-night.jpg',
  earthClouds: '../assets/images/scenes/journey/earth-clouds.jpg'
};

// ---- renderer ---------------------------------------------------------------
const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({ canvas, antialias:true, alpha:true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.05;
renderer.setClearColor(BG, 1);
const MAX_ANISO = renderer.capabilities.getMaxAnisotropy();

// ---- scene / camera ---------------------------------------------------------
const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(38, window.innerWidth/window.innerHeight, 0.05, 8000);
camera.position.set(0, 0, 12);

// ---- the SUN (single directional light, world-space, fixed) -----------------
// Coming from screen-right-ish and slightly forward so every body shows a clean
// terminator. We keep the SAME world direction for all shader bodies for unity.
const SUN_DIR = new THREE.Vector3(0.78, 0.18, 0.60).normalize();

const sun = new THREE.DirectionalLight(0xfff4e6, 2.0);
sun.position.copy(SUN_DIR).multiplyScalar(500);
scene.add(sun);

// gentle ambient fill so the night sides never go fully crushed-black
scene.add(new THREE.AmbientLight(0x1a2236, 0.22));

// ---- texture loader with SAFE fallbacks (never goes black) ------------------
const texLoader = new THREE.TextureLoader();
function loadTex(url, { srgb=true } = {}, onReady){
  texLoader.load(
    url,
    (t)=>{
      t.colorSpace = srgb ? THREE.SRGBColorSpace : THREE.NoColorSpace;
      t.anisotropy = MAX_ANISO;
      t.wrapS = THREE.RepeatWrapping;       // equirectangular wraps in longitude
      t.wrapT = THREE.ClampToEdgeWrapping;  // clamp at the poles
      onReady(t, true);
    },
    undefined,
    ()=>{ console.warn('[journey] texture failed, using fallback colour:', url); onReady(null, false); }
  );
}

// ============================================================================
//  RELATIVE SIZES (documentary realism)
//  Real radii ratios: Moon 0.273 · Mars 0.532 · Earth 1.000 (Earth = 1 unit).
//  We honour those ratios so the bodies read as real worlds in a vast black.
// ============================================================================
const R_EARTH = 1.0;
const R_MARS  = 0.532;
const R_MOON  = 0.273;

// Positions: strung along a gentle line through deep space so the camera can
// fly past each in turn. Large gaps = lots of negative space (the void).
const P_MARS  = new THREE.Vector3(  0,    0,    0   );
const P_MOON  = new THREE.Vector3( 14,   1.6, -34  );
const P_EARTH = new THREE.Vector3(  4,  -2.2, -86  );

// ============================================================================
//  SHARED: simple lit-body shader (Mars, Moon) — single sun, soft terminator
// ============================================================================
function makeBodyMaterial(fallbackColor){
  const uniforms = {
    map:      { value: null },
    hasMap:   { value: 0 },
    sunDir:   { value: SUN_DIR.clone() },
    baseCol:  { value: new THREE.Color(fallbackColor) },
    ambient:  { value: 0.12 }
  };
  const mat = new THREE.ShaderMaterial({
    uniforms,
    vertexShader: /* glsl */`
      varying vec3 vNormalW;
      varying vec2 vUv;
      void main(){
        vUv = uv;
        vNormalW = normalize(mat3(modelMatrix) * normal);
        gl_Position = projectionMatrix * modelViewMatrix * vec4(position,1.0);
      }`,
    fragmentShader: /* glsl */`
      uniform sampler2D map;
      uniform int hasMap;
      uniform vec3 sunDir;
      uniform vec3 baseCol;
      uniform float ambient;
      varying vec3 vNormalW;
      varying vec2 vUv;
      void main(){
        vec3 N = normalize(vNormalW);
        float lambert = dot(N, normalize(sunDir));   // -1..1
        // soft, cinematic terminator
        float lit = smoothstep(-0.18, 0.22, lambert);
        vec3 albedo = (hasMap==1) ? texture2D(map, vUv).rgb : baseCol;
        // day shading with a gentle ambient floor so night isn't pure black
        float shade = ambient + (1.0-ambient) * clamp(lambert, 0.0, 1.0);
        vec3 col = albedo * mix(ambient*0.9, shade, lit);
        gl_FragColor = vec4(col, 1.0);
      }`
  });
  return { mat, uniforms };
}

// ---- MARS -------------------------------------------------------------------
const marsGroup = new THREE.Group();
marsGroup.position.copy(P_MARS);
marsGroup.rotation.z = THREE.MathUtils.degToRad(25.2);   // Mars axial tilt
scene.add(marsGroup);
const marsM = makeBodyMaterial(0xb5623c);                // rusty fallback
const mars = new THREE.Mesh(new THREE.SphereGeometry(R_MARS, 96, 96), marsM.mat);
marsGroup.add(mars);
loadTex(TEX.mars, {}, (t,ok)=>{ marsM.uniforms.map.value=t; marsM.uniforms.hasMap.value=ok?1:0; marsM.mat.needsUpdate=true; });

// ---- MOON -------------------------------------------------------------------
const moonGroup = new THREE.Group();
moonGroup.position.copy(P_MOON);
moonGroup.rotation.z = THREE.MathUtils.degToRad(6.7);
scene.add(moonGroup);
const moonM = makeBodyMaterial(0x8a8a90);                // grey fallback
const moon = new THREE.Mesh(new THREE.SphereGeometry(R_MOON, 96, 96), moonM.mat);
moonGroup.add(moon);
loadTex(TEX.moon, {}, (t,ok)=>{ moonM.uniforms.map.value=t; moonM.uniforms.hasMap.value=ok?1:0; moonM.mat.needsUpdate=true; });

// ============================================================================
//  EARTH — day/night blend + city-light dark side + clouds + thin fresnel rim
// ============================================================================
const earthGroup = new THREE.Group();
earthGroup.position.copy(P_EARTH);
earthGroup.rotation.z = THREE.MathUtils.degToRad(23.4);  // Earth axial tilt
scene.add(earthGroup);

const earthUniforms = {
  dayMap:   { value: null },
  nightMap: { value: null },
  hasDay:   { value: 0 },
  hasNight: { value: 0 },
  sunDir:   { value: SUN_DIR.clone() },
  dayCol:   { value: new THREE.Color(0x244b78) },   // ocean-ish fallback
  nightCol: { value: new THREE.Color(0x04060d) }
};

const earthMat = new THREE.ShaderMaterial({
  uniforms: earthUniforms,
  vertexShader: /* glsl */`
    varying vec3 vNormalW;
    varying vec3 vViewDir;
    varying vec2 vUv;
    void main(){
      vUv = uv;
      vec4 wp = modelMatrix * vec4(position,1.0);
      vNormalW = normalize(mat3(modelMatrix) * normal);
      vViewDir = normalize(cameraPosition - wp.xyz);
      gl_Position = projectionMatrix * viewMatrix * wp;
    }`,
  fragmentShader: /* glsl */`
    uniform sampler2D dayMap;
    uniform sampler2D nightMap;
    uniform int hasDay;
    uniform int hasNight;
    uniform vec3 sunDir;
    uniform vec3 dayCol;
    uniform vec3 nightCol;
    varying vec3 vNormalW;
    varying vec3 vViewDir;
    varying vec2 vUv;
    void main(){
      vec3 N = normalize(vNormalW);
      float lambert = dot(N, normalize(sunDir));     // -1..1
      float dayAmt  = smoothstep(-0.10, 0.20, lambert);

      vec3 day   = (hasDay==1)   ? texture2D(dayMap,   vUv).rgb : dayCol;
      vec3 night = (hasNight==1) ? texture2D(nightMap, vUv).rgb : nightCol;

      // city lights only glow where it's genuinely dark; lift a touch on terminator
      night *= (0.85 + 0.55*(1.0 - dayAmt));
      // lit day with a soft ambient floor so the dark side still has faint form
      vec3 litDay = day * (0.16 + 0.92*clamp(lambert, 0.0, 1.0));

      vec3 col = mix(night*0.9, litDay, dayAmt);

      gl_FragColor = vec4(col, 1.0);
    }`
});

const earth = new THREE.Mesh(new THREE.SphereGeometry(R_EARTH, 128, 128), earthMat);
earthGroup.add(earth);

loadTex(TEX.earthDay,   {},               (t,ok)=>{ earthUniforms.dayMap.value=t;   earthUniforms.hasDay.value=ok?1:0;   earthMat.needsUpdate=true; });
loadTex(TEX.earthNight, { srgb:true },    (t,ok)=>{ earthUniforms.nightMap.value=t; earthUniforms.hasNight.value=ok?1:0; earthMat.needsUpdate=true; });

// ---- CLOUDS: slightly larger transparent sphere, luminance → alpha, slow drift
const cloudUniforms = {
  cloudMap: { value: null },
  hasMap:   { value: 0 },
  sunDir:   { value: SUN_DIR.clone() }
};
const cloudMat = new THREE.ShaderMaterial({
  uniforms: cloudUniforms,
  transparent: true,
  depthWrite: false,
  vertexShader: /* glsl */`
    varying vec3 vNormalW;
    varying vec2 vUv;
    void main(){
      vUv = uv;
      vNormalW = normalize(mat3(modelMatrix) * normal);
      gl_Position = projectionMatrix * modelViewMatrix * vec4(position,1.0);
    }`,
  fragmentShader: /* glsl */`
    uniform sampler2D cloudMap;
    uniform int hasMap;
    uniform vec3 sunDir;
    varying vec3 vNormalW;
    varying vec2 vUv;
    void main(){
      if(hasMap==0) discard;                 // no clouds tex → invisible (never black)
      vec3 c = texture2D(cloudMap, vUv).rgb;
      float alpha = dot(c, vec3(0.299,0.587,0.114));  // luminance as alpha
      alpha = smoothstep(0.12, 0.85, alpha);
      vec3 N = normalize(vNormalW);
      float lit = smoothstep(-0.12, 0.28, dot(N, normalize(sunDir)));
      // clouds only catch the sun; faint blue-white, fade on the night side
      vec3 col = vec3(0.92,0.95,1.0) * (0.22 + 0.85*lit);
      gl_FragColor = vec4(col, alpha * (0.20 + 0.80*lit));
    }`
});
const clouds = new THREE.Mesh(new THREE.SphereGeometry(R_EARTH*1.012, 96, 96), cloudMat);
earthGroup.add(clouds);
loadTex(TEX.earthClouds, { srgb:true }, (t,ok)=>{ cloudUniforms.cloudMap.value=t; cloudUniforms.hasMap.value=ok?1:0; cloudMat.needsUpdate=true; });

// ---- ATMOSPHERE: thin fresnel rim glow (subtle blue, NOT overpowering) ------
const atmoMat = new THREE.ShaderMaterial({
  transparent: true,
  blending: THREE.AdditiveBlending,
  side: THREE.BackSide,
  depthWrite: false,
  uniforms: {
    glow:   { value: new THREE.Color(0x3c7be0) },
    sunDir: { value: SUN_DIR.clone() }
  },
  vertexShader: /* glsl */`
    varying vec3 vN; varying vec3 vV;
    void main(){
      vec4 wp = modelMatrix * vec4(position,1.0);
      vN = normalize(mat3(modelMatrix) * normal);
      vV = normalize(cameraPosition - wp.xyz);
      gl_Position = projectionMatrix * viewMatrix * wp;
    }`,
  fragmentShader: /* glsl */`
    uniform vec3 glow; uniform vec3 sunDir;
    varying vec3 vN; varying vec3 vV;
    void main(){
      float fres = pow(1.0 - max(dot(normalize(vN), normalize(vV)), 0.0), 4.2);
      float lit  = smoothstep(-0.35, 0.55, dot(normalize(vN), normalize(sunDir)));
      // keep it THIN and quiet — brand disliked heavy blue haze
      float a = fres * (0.06 + 0.34*lit);
      gl_FragColor = vec4(glow, a * 0.85);
    }`
});
const atmosphere = new THREE.Mesh(new THREE.SphereGeometry(R_EARTH*1.022, 96, 96), atmoMat);
earthGroup.add(atmosphere);

// ============================================================================
//  STARFIELD — quiet, deep, mostly off-white with rare teal/blue accents
// ============================================================================
function makeStars(count, radius){
  const g = new THREE.BufferGeometry();
  const pos = new Float32Array(count*3);
  const col = new Float32Array(count*3);
  const cTeal = new THREE.Color(TEAL), cStar = new THREE.Color(STAR), cBlue = new THREE.Color(BLUE);
  for(let i=0;i<count;i++){
    const u=Math.random(), v=Math.random();
    const th=2*Math.PI*u, ph=Math.acos(2*v-1);
    const r=radius*(0.6+Math.random()*0.4);
    pos[i*3]   = r*Math.sin(ph)*Math.cos(th);
    pos[i*3+1] = r*Math.cos(ph);
    pos[i*3+2] = r*Math.sin(ph)*Math.sin(th);
    const t=Math.random();
    const c = t>0.965 ? cTeal : (t>0.93 ? cBlue : cStar);
    const b = 0.35+Math.random()*0.6;
    col[i*3]=c.r*b; col[i*3+1]=c.g*b; col[i*3+2]=c.b*b;
  }
  g.setAttribute('position', new THREE.BufferAttribute(pos,3));
  g.setAttribute('color',    new THREE.BufferAttribute(col,3));
  const m = new THREE.PointsMaterial({
    size:0.9, sizeAttenuation:true, vertexColors:true,
    transparent:true, opacity:0.92, depthWrite:false, blending:THREE.AdditiveBlending
  });
  return new THREE.Points(g, m);
}
// huge shell so stars sit far beyond the bodies — a vast black
const stars = makeStars(3800, 1200);
scene.add(stars);

// ============================================================================
//  SCROLL-LINKED CAMERA JOURNEY
//  We define, for several keyframe p-values, an eye position and a look-at
//  target. Each is "look at body, from a distance d along the body→camera axis"
//  so framing stays well-composed regardless of body size. We interpolate with
//  Catmull-Rom-style smoothing between keys and ease the whole curve.
// ============================================================================

const clamp01 = (x)=> Math.max(0, Math.min(1, x));
const lerp    = (a,b,t)=> a+(b-a)*t;
const easeInOut = (x)=> x<0.5 ? 4*x*x*x : 1-Math.pow(-2*x+2,3)/2;
const v3 = (x,y,z)=> new THREE.Vector3(x,y,z);

// A keyframe places the camera at `target + offset`, looking at `target`.
// `offset` is authored in world units; we choose offsets so each body sits
// nicely in a 38° vertical FOV.
//   At distance d, a sphere of radius R fills the frame when d ≈ R / tan(fov/2).
//   tan(19°) ≈ 0.344 → "fills frame" distance ≈ R / 0.344 ≈ 2.9·R.
const KEYS = [
  // p,      target (body centre),                 camera offset from target
  // -- MARS: fills the frame, then pulls back to a disc --------------------
  { p:0.00, look:P_MARS.clone(),  off:v3( 0.0,  0.05,  R_MARS*2.95) },  // Mars fills frame
  { p:0.20, look:P_MARS.clone(),  off:v3( 0.4,  0.20,  R_MARS*5.6 ) },  // easing back
  { p:0.30, look:P_MARS.clone(),  off:v3( 1.1,  0.45,  R_MARS*11.0) },  // Mars now a disc
  // -- cross the void toward the Moon --------------------------------------
  { p:0.40, look:P_MOON.clone(),  off:v3( 1.6,  0.70,  R_MOON*16.0) },  // Moon approached, still smallish
  // -- MOON: grows, shown close --------------------------------------------
  { p:0.48, look:P_MOON.clone(),  off:v3( 0.3,  0.10,  R_MOON*4.2 ) },  // Moon grows
  { p:0.55, look:P_MOON.clone(),  off:v3(-0.15, 0.04,  R_MOON*2.95) },  // Moon close, fills
  // -- pull back from the Moon ---------------------------------------------
  { p:0.62, look:P_MOON.clone(),  off:v3(-0.9,  0.45,  R_MOON*10.0) },  // recede
  // -- approach EARTH -------------------------------------------------------
  { p:0.74, look:P_EARTH.clone(), off:v3(-1.2,  0.30,  R_EARTH*7.6 ) }, // Earth in view, distant
  { p:0.88, look:P_EARTH.clone(), off:v3(-0.4,  0.10,  R_EARTH*5.2 ) }, // approaching
  // -- HANDOFF: Earth a centred globe-with-space (matches a MapLibre z~1.25 globe) --
  { p:1.00, look:P_EARTH.clone(), off:v3( 0.0,  0.0,   R_EARTH*4.05) }  // Earth globe, space around it
];
// host can fine-tune the handoff face/distance from the iframe URL (?earthDeg=&earthDist=)
const _QP = new URLSearchParams(location.search);
const _qDist = parseFloat(_QP.get('earthDist'));
if (!isNaN(_qDist) && _qDist > 0) KEYS[KEYS.length-1].off.z = R_EARTH * _qDist;

// Catmull-Rom interpolation between two vectors with neighbour tangents.
function catmull(p0, p1, p2, p3, t){
  const t2=t*t, t3=t2*t;
  return new THREE.Vector3(
    0.5*((2*p1.x)+(-p0.x+p2.x)*t+(2*p0.x-5*p1.x+4*p2.x-p3.x)*t2+(-p0.x+3*p1.x-3*p2.x+p3.x)*t3),
    0.5*((2*p1.y)+(-p0.y+p2.y)*t+(2*p0.y-5*p1.y+4*p2.y-p3.y)*t2+(-p0.y+3*p1.y-3*p2.y+p3.y)*t3),
    0.5*((2*p1.z)+(-p0.z+p2.z)*t+(2*p0.z-5*p1.z+4*p2.z-p3.z)*t2+(-p0.z+3*p1.z-3*p2.z+p3.z)*t3)
  );
}

// Precompute absolute camera-eye position and look-at target for each key.
const EYES  = KEYS.map(k => k.look.clone().add(k.off));
const LOOKS = KEYS.map(k => k.look.clone());

// Sample the smooth path at an eased global progress p∈[0,1].
function samplePath(pRaw){
  const p = clamp01(pRaw);
  // find segment
  let i = 0;
  while(i < KEYS.length-2 && p > KEYS[i+1].p) i++;
  const pa = KEYS[i].p, pb = KEYS[i+1].p;
  const localRaw = (p - pa) / Math.max(1e-6, (pb - pa));
  const t = easeInOut(clamp01(localRaw));   // ease within each segment for cinematic feel

  const i0 = Math.max(0, i-1), i1 = i, i2 = i+1, i3 = Math.min(KEYS.length-1, i+2);
  const eye  = catmull(EYES[i0],  EYES[i1],  EYES[i2],  EYES[i3],  t);
  const look = catmull(LOOKS[i0], LOOKS[i1], LOOKS[i2], LOOKS[i3], t);
  return { eye, look };
}

// ---- public progress state --------------------------------------------------
let _p = 0;
let userControlled = false;
let autoT = 0;
let cloudDrift = 0;

// smoothed camera state (so even direct scrubbing feels eased, never snaps)
const camEye  = EYES[0].clone();
const camLook = LOOKS[0].clone();

window.setJourneyProgress = function(p){
  userControlled = true;
  _p = clamp01(typeof p === 'number' ? p : 0);
};

// debug / handoff hook
window.__journey = {
  scene, camera,
  planets: { mars, moon, earth },
  get progress(){ return _p; },
  setProgress: (p)=> window.setJourneyProgress(p)
};

// ============================================================================
//  ANIMATION LOOP
// ============================================================================
const clock = new THREE.Clock();

function animate(){
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.05);

  // ---- progress source: gentle auto-drift until the first scroll call ----
  if(!userControlled){
    autoT += dt;
    // slow, looping ease across the whole journey so the scene shows life
    const loopP = (autoT % 46) / 46;        // ~46s round trip
    // ease both directions (out-and-back) so it breathes rather than jumps
    _p = loopP < 0.5 ? easeInOut(loopP*2) : easeInOut((1-loopP)*2);
  }

  // ---- sample the cinematic path, then smooth-follow (no snapping) ----
  const s = samplePath(_p);
  // critically-damped-ish follow; frame-rate independent
  const kPos  = 1 - Math.pow(0.0009, dt);
  camEye.lerp(s.eye,  kPos);
  camLook.lerp(s.look, kPos);
  camera.position.copy(camEye);
  camera.lookAt(camLook);

  // ---- idle life: Mars & Moon drift on a timer; EARTH's facing is LOCKED to
  //      progress so the Atlantic/Africa handoff face is always deterministic ----
  mars.rotation.y  += dt * 0.018;
  moon.rotation.y  += dt * 0.012;
  const eY = EARTH_HANDOFF_RAD - (1 - clamp01(_p)) * 0.55;   // eases into the handoff face as we arrive
  earth.rotation.y  = eY;
  clouds.rotation.y = eY + cloudDrift;
  cloudDrift += dt * 0.006;                  // gentle cloud drift relative to the surface
  stars.rotation.y += dt * 0.0009;           // near-imperceptible parallax in the void

  renderer.render(scene, camera);
}

// ---- orient Earth so the ATLANTIC / AFRICA face is toward camera at p=1 ----
// earth-day.jpg is equirectangular with longitude 0 (Greenwich) at the centre
// column (u=0.5). On a Three.js sphere with default UVs and rotation.y=0, the
// +Z meridian (toward a camera on +Z) corresponds to u≈0.25 → roughly lng -90°.
// We rotate Earth so that the meridian facing the camera at p=1 is near
// lng -42° / lat 18° (mid-Atlantic, off West Africa) for the MapLibre handoff.
// Verified empirically against earth-day.jpg: rotation.y = 297° centres the
// mid-Atlantic — West Africa (Sahara coast) upper-right, S. America (Brazil)
// lower-left, Atlantic filling the centre — exactly the MapLibre handoff face.
const _qDeg = parseFloat(_QP.get('earthDeg'));
const EARTH_HANDOFF_DEG = (!isNaN(_qDeg)) ? _qDeg : 332;
const EARTH_HANDOFF_RAD = THREE.MathUtils.degToRad(EARTH_HANDOFF_DEG);
// (the animation loop keeps earth + clouds locked to this face as a function of progress)

animate();

// ============================================================================
//  RESIZE
// ============================================================================
window.addEventListener('resize', ()=>{
  const w=window.innerWidth, h=window.innerHeight;
  renderer.setSize(w,h);
  camera.aspect = w/h;
  camera.updateProjectionMatrix();
});
</script>
</body>
</html>
