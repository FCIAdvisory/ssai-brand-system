    active=k;
    Object.keys(btns).forEach(function(key){
      var on=key===k;
      btns[key].classList.toggle('on',on);
      btns[key].setAttribute('aria-pressed',on?'true':'false');
    });
    if(selected>=0 && !matches(nodes[selected])){ selected=-1; renderDetail(); }
    updateTargets();
    if(reduce){ nodes.forEach(function(nd){ nd.cur=nd.tgt; }); draw(0); }
  }

  function renderDetail(){
    if(selected<0){
      detail.innerHTML='<div class="kmf-d-empty">Select a node to read its contribution</div>';
      return;
    }
    var m=nodes[selected].m;
    var g=GROUPS[m.g];
    detail.innerHTML=
      '<div class="kmf-d-card">'+
      '<div class="kmf-d-top">'+
      '<span class="kmf-d-tag" style="color:'+g.c+';border-color:'+hx(g.c,0.4)+';background:'+hx(g.c,0.10)+'">'+g.label+'</span>'+
      '<span class="kmf-d-name">'+m.n+'</span>'+
      '</div>'+
      '<div class="kmf-d-desc">'+m.d+'</div>'+
      '</div>';
  }

  function pick(px,py){
    var best=-1, bd=18*18;
    for(var i=0;i<nodes.length;i++){
      var nd=nodes[i];
      if(nd.cur<0.35) continue;
      var dx=px-nd.x, dy=py-nd.y;
      var d=dx*dx+dy*dy;
      if(d<bd){ bd=d; best=i; }
    }
    return best;
  }

  function evtPos(e){
    var rect=canvas.getBoundingClientRect();
    var cx=(e.touches?e.touches[0].clientX:e.clientX)-rect.left;
    var cy=(e.touches?e.touches[0].clientY:e.clientY)-rect.top;
    return {x:cx,y:cy};
  }

  canvas.addEventListener('mousemove',function(e){
    var p=evtPos(e);
    var h=pick(p.x,p.y);
    if(h!==hover){ hover=h; canvas.style.cursor=h>=0?'pointer':'default'; }
  });
  canvas.addEventListener('mouseleave',function(){ hover=-1; });
  canvas.addEventListener('click',function(e){
    var p=evtPos(e);
    var h=pick(p.x,p.y);
    if(h>=0){ selected=(selected===h)?-1:h; renderDetail(); }
  });
  canvas.addEventListener('touchstart',function(e){
    var p=evtPos(e);
    var h=pick(p.x,p.y);
    if(h>=0){ selected=(selected===h)?-1:h; renderDetail(); e.preventDefault(); }
  },{passive:false});

  controls.addEventListener('click',function(e){
    var b=e.target.closest('.kmf-btn'); if(!b) return;
    setActive(b.getAttribute('data-k'));
  });

  function ease(a,b,k){ return a+(b-a)*k; }

  function draw(time){
    ctx.clearRect(0,0,W,H);
    var i,nd,a,b;

    for(i=0;i<nodes.length;i++){
      nd=nodes[i];
      nd.cur=ease(nd.cur,nd.tgt,reduce?1:0.12);
      var fl=reduce?0:Math.sin(time*0.0011+nd.ph)*3.0;
      var fl2=reduce?0:Math.cos(time*0.0009+nd.ph*1.3)*2.4;
      nd.x=nd.bx+fl;
      nd.y=nd.by+fl2;
      var hovOn=(hover===i)||(selected===i);
      nd.glow=ease(nd.glow,hovOn?1:0,reduce?1:0.18);
    }

    for(i=0;i<nodes.length;i++){
      a=nodes[i];
      if(a.cur<0.18) continue;
      for(var j=i+1;j<nodes.length;j++){
        b=nodes[j];
        if(b.cur<0.18) continue;
        if(a.m.g!==b.m.g) continue;
        var dx=a.x-b.x, dy=a.y-b.y;
        var dd=Math.sqrt(dx*dx+dy*dy);
        var maxd=Math.min(W,H)*0.30;
        if(dd<maxd){
          var op=(1-dd/maxd)*0.5*Math.min(a.cur,b.cur)*Math.min(a.cur,b.cur);
          if(op<0.012) continue;
          var col=GROUPS[a.m.g].c;
          ctx.strokeStyle=hx(col,op);
          ctx.lineWidth=1;
          ctx.beginPath();
          ctx.moveTo(a.x,a.y);
          ctx.lineTo(b.x,b.y);
          ctx.stroke();
        }
      }
    }

    for(i=0;i<nodes.length;i++){
      nd=nodes[i];
      var vis=nd.cur;
      if(vis<0.04) continue;
      var col=GROUPS[nd.m.g].c;
      var sel=(selected===i);
      var hovd=(hover===i);
      var em=0.18+0.82*vis;
      var r=nd.r*(0.85+vis*0.15)+nd.glow*2.2+(sel?1.4:0);

      if((nd.glow>0.02||sel)&&vis>0.3){
        ctx.beginPath();
        ctx.arc(nd.x,nd.y,r+8*nd.glow+(sel?5:0),0,Math.PI*2);
        ctx.fillStyle=hx(col,0.14*nd.glow+(sel?0.10:0));
        ctx.fill();
      }

      ctx.beginPath();
      ctx.arc(nd.x,nd.y,r,0,Math.PI*2);
      ctx.fillStyle=hx(col,em);
      ctx.fill();

      ctx.beginPath();
      ctx.arc(nd.x,nd.y,r,0,Math.PI*2);
      ctx.strokeStyle=hx('#f4f5ff',(0.25+0.45*vis)*(sel||hovd?1:0.6));
      ctx.lineWidth=sel?1.4:1;
      ctx.stroke();

      var labelAlpha=(active!=='all')?Math.max(0,(vis-0.5)*2):Math.max(nd.glow,sel?1:0);
      if(labelAlpha>0.03){
        ctx.font='600 11px Inter, system-ui, sans-serif';
        ctx.textAlign='center';
        ctx.textBaseline='top';
        var tx=nd.x, ty=nd.y+r+4;
        var label=nd.m.n;
        var tw=ctx.measureText(label).width;
        ctx.fillStyle=hx('#050314',0.55*labelAlpha);
        ctx.fillRect(tx-tw/2-3,ty-1,tw+6,15);
        ctx.fillStyle=hx('#f4f5ff',(sel?1:0.88)*labelAlpha);
        ctx.fillText(label,tx,ty);
      }
    }
  }

  var raf;
  function loop(t){ draw(t); raf=requestAnimationFrame(loop); }

  function start(){
    size();
    updateTargets();
    nodes.forEach(function(nd){ nd.cur=nd.tgt; });
    if(reduce){ draw(0); }
    else { raf=requestAnimationFrame(loop); }
  }

  var rt;
  window.addEventListener('resize',function(){
    clearTimeout(rt);
    rt=setTimeout(function(){ size(); if(reduce) draw(0); },120);
  });

  start();
})();
</script>
</body></html>
