<style>
:root{--accent:#3cc8ff;--accent-rgb:60,200,255;--accent-ink:#04121c;--space:#050314;--indigo:#16145f;--star:#f4f5ff;--neb:#a6abe6;--hair:rgba(166,171,230,.16);
--ion:var(--accent);--aurora:var(--accent);--orbit:var(--accent);--plasma:var(--accent);--nebula:var(--accent);--solar:var(--accent);--coral:var(--accent);--teal:var(--accent);}
*{box-sizing:border-box;}
html,body{margin:0;background:var(--space);color:var(--star);font-family:'Inter',system-ui,-apple-system,sans-serif;-webkit-font-smoothing:antialiased;min-height:100vh;}
.mb-wrap{min-height:100vh;display:flex;flex-direction:column;}
.mb-bar{display:flex;align-items:center;justify-content:space-between;gap:14px;padding:14px 20px;border-bottom:1px solid var(--hair);position:relative;z-index:5;}
.mb-left{display:flex;align-items:center;gap:13px;min-width:0;}

.mb-titles{min-width:0;}

.mb-title{font-family:'Chakra Petch',sans-serif;font-style:italic;font-weight:700;text-transform:uppercase;letter-spacing:.02em;font-size:15px;line-height:1.05;color:var(--star);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

#kit-keeling-co2 .kc-range::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:15px;height:15px;border-radius:50%;background:var(--accent,#3cc8ff);border:2px solid #050314;box-shadow:0 0 8px var(--accent,#3cc8ff);cursor:pointer}
#kit-keeling-co2 .kc-range::-moz-range-thumb{width:15px;height:15px;border-radius:50%;background:var(--accent,#3cc8ff);border:2px solid #050314;box-shadow:0 0 8px var(--accent,#3cc8ff);cursor:pointer}

@media (max-width:520px){#kit-keeling-co2 .kc-readout{text-align:left;min-width:0}#kit-keeling-co2 .kc-r-ppm{font-size:26px}#kit-keeling-co2 .kc-stage{aspect-ratio:4/3}}

body.mb-embed #kit-keeling-co2{padding:0!important;border:0!important;border-radius:0!important;background:transparent!important;box-shadow:none!important;margin:0!important;width:100%!important;max-width:none!important;height:100%!important;}

body.mb-embed #kit-keeling-co2 [class*='frame'],body.mb-embed #kit-keeling-co2 [class*='shell'],body.mb-embed #kit-keeling-co2 [class*='-inner'],body.mb-embed #kit-keeling-co2 [class*='wrapper']{display:contents!important;}
body.mb-embed #kit-keeling-co2 [class*='stage'],body.mb-embed #kit-keeling-co2 [class*='scene'],body.mb-embed #kit-keeling-co2 [class*='plotwrap'],body.mb-embed #kit-keeling-co2 [class*='plot-'],body.mb-embed #kit-keeling-co2 [class*='canvas-wrap'],body.mb-embed #kit-keeling-co2 [class*='canvaswrap']{flex:1 1 auto!important;min-height:0!important;aspect-ratio:auto!important;height:auto!important;}

</style></head>
<body>
<div class="mb-wrap">
  <header class="mb-bar">
    <div class="mb-left">
      <img class="mb-ssai" src="../assets/logo/ssai-white-mark.png" alt="SSAI">
      <div class="mb-titles"><div class="mb-kicker">SSAI Interactive</div><div class="mb-title">The CO2 record</div></div>
    </div>
    
  </header>
  <div class="mb-stage"><div class="kfig" id="kit-keeling-co2"></div></div>
  <footer class="mb-credit">
    <span class="mb-c-int">Hover/drag the chart or use the year slider to read year + ppm; toggle the seasonal cycle, replay the draw-on; live accent recolor.</span>
    <span class="mb-c-src">Concept · SSAI</span>
  </footer>
</div>
<script>
(function(){
  try{
    var q=new URLSearchParams(location.search);
    var ac=q.get('accent'); if(ac){ document.documentElement.style.setProperty('--accent',ac);
      var h=ac.replace('#',''); if(h.length===3) h=h[0]+h[0]+h[1]+h[1]+h[2]+h[2];
      var n=parseInt(h,16); if(!isNaN(n)) document.documentElement.style.setProperty('--accent-rgb',((n>>16)&255)+','+((n>>8)&255)+','+(n&255)); }
    var th=q.get('theme'); if(th==='light') document.documentElement.setAttribute('data-theme','light');
    if(q.get('embed')==='1') document.body.classList.add('mb-embed');
  }catch(e){}
})();
</script>
<script>
(function(){
  var root=document.getElementById('kit-keeling-co2'); if(!root) return;
  if(root.getAttribute('data-kc-init')==='1') return; root.setAttribute('data-kc-init','1');

  var reduce=false;
  try{ reduce=window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches; }catch(e){}

  var accent='#3cc8ff', accentRGB='60,200,255';
  function hexToRgb(h){ if(!h) return null; h=h.replace('#',''); if(h.length===3) h=h[0]+h[0]+h[1]+h[1]+h[2]+h[2]; if(h.length!==6) return null; var n=parseInt(h,16); if(isNaN(n)) return null; return (n>>16&255)+','+(n>>8&255)+','+(n&255); }
  function readAccent(){ try{ var cs=getComputedStyle(document.documentElement); var a=cs.getPropertyValue('--accent').trim(); if(a) accent=a; var r=cs.getPropertyValue('--accent-rgb').trim(); if(r) accentRGB=r; else accentRGB=hexToRgb(accent)||accentRGB; }catch(e){} }
  readAccent();

  root.innerHTML='';
  var wrap=document.createElement('div'); wrap.className='kc-wrap';
  var head=document.createElement('div'); head.className='kc-head';
  head.innerHTML='<div class="kc-titles"><div class="kc-eyebrow">Earth &amp; climate · illustrative</div><h3 class="kc-title">The CO₂ record</h3><div class="kc-sub">Atmospheric carbon dioxide, 1960–2026 — the Keeling curve</div></div><div class="kc-readout" aria-live="polite"><div class="kc-r-year" id="kc-r-year">2026</div><div class="kc-r-ppm"><span id="kc-r-ppm">425</span><span class="kc-unit">ppm</span></div><div class="kc-r-note" id="kc-r-note">latest</div></div>';
  wrap.appendChild(head);
  var stage=document.createElement('div'); stage.className='kc-stage';
  var canvas=document.createElement('canvas'); canvas.className='kc-canvas';
  canvas.setAttribute('role','img');
  canvas.setAttribute('aria-label','Line chart of atmospheric carbon dioxide rising from about 315 parts per million in 1960 to about 425 parts per million in 2026, with a yearly seasonal sawtooth.');
  stage.appendChild(canvas); wrap.appendChild(stage);
  var controls=document.createElement('div'); controls.className='kc-controls';
  controls.innerHTML='<button type="button" class="kc-btn" id="kc-replay" aria-label="Replay drawing animation"><span class="kc-ico" aria-hidden="true"></span><span>Replay</span></button><button type="button" class="kc-btn kc-toggle is-on" id="kc-season" aria-pressed="true">Seasonal cycle</button><div class="kc-scrub"><label class="kc-scrub-lab" for="kc-range">Scrub year</label><input type="range" class="kc-range" id="kc-range" min="1960" max="2026" step="0.0833" value="2026"></div>';
  wrap.appendChild(controls);
  var foot=document.createElement('div'); foot.className='kc-foot';
  foot.innerHTML='Illustrative reconstruction in SSAI style — trend and seasonal amplitude approximate the Mauna Loa record. Not measured data.';
  wrap.appendChild(foot);
  root.appendChild(wrap);

  var rYear=document.getElementById('kc-r-year');
  var rPpm=document.getElementById('kc-r-ppm');
  var rNote=document.getElementById('kc-r-note');
  var range=document.getElementById('kc-range');
  var replayBtn=document.getElementById('kc-replay');
  var seasonBtn=document.getElementById('kc-season');
  var ctx=canvas.getContext('2d');

  var Y0=1960, Y1=2026, SPAN=Y1-Y0;
  var seasonOn=true;
  function baseline(y){ var t=y-1960; return 317 + 0.80466*t + 0.012602*t*t; }
  function seasonAmp(y){ return 3.0 + 0.006*(y-1960); }
  function seasonal(y){ if(!seasonOn) return 0; var frac=y-Math.floor(y); var phase=(frac-0.38); var s=Math.cos(2*Math.PI*phase); var s2=0.18*Math.cos(4*Math.PI*phase-0.6); return seasonAmp(y)*(s+s2); }
  function co2(y){ return baseline(y)+seasonal(y); }

  var PPM_MIN=305, PPM_MAX=432;
  var MONTHLY=[]; (function(){ for(var y=Y0; y<=Y1+0.0001; y+=1/12){ MONTHLY.push(y); } })();
  var ANN=[{y:1960,label:'≈ 317 ppm',sub:'1960'},{y:2026,label:'≈ 425 ppm',sub:'2026'}];

  var W=0,H=0,dpr=1, pad={l:54,r:18,t:18,b:34};
  function resize(){ var r=stage.getBoundingClientRect(); W=Math.max(280,r.width); H=Math.max(220,r.height); dpr=Math.min(2,window.devicePixelRatio||1); canvas.width=Math.round(W*dpr); canvas.height=Math.round(H*dpr); canvas.style.width=W+'px'; canvas.style.height=H+'px'; ctx.setTransform(dpr,0,0,dpr,0,0); }
  function xFor(y){ var pw=W-pad.l-pad.r; return pad.l + (y-Y0)/SPAN*pw; }
  function yFor(p){ var ph=H-pad.t-pad.b; return pad.t + (1-(p-PPM_MIN)/(PPM_MAX-PPM_MIN))*ph; }

  var drawTo=Y1, animStart=0, animDur=2600, animating=!reduce;
  if(reduce) drawTo=Y1;
  var scrubYear=Y1;
  function fmtYear(y){ return Math.round(y).toString(); }
  function colorWithAlpha(a){ return 'rgba('+accentRGB+','+a+')'; }

  function drawGrid(){
    ctx.lineWidth=1; ctx.font='11px Inter, system-ui, sans-serif'; ctx.textBaseline='middle';
    var ticks=[320,340,360,380,400,420];
    for(var i=0;i<ticks.length;i++){ var p=ticks[i]; var yy=yFor(p); ctx.strokeStyle='rgba(166,171,230,0.10)'; ctx.beginPath(); ctx.moveTo(pad.l,yy); ctx.lineTo(W-pad.r,yy); ctx.stroke(); ctx.fillStyle='rgba(166,171,230,0.6)'; ctx.textAlign='right'; ctx.fillText(p+'',pad.l-8,yy); }
    ctx.save(); ctx.translate(14,pad.t+(H-pad.t-pad.b)/2); ctx.rotate(-Math.PI/2); ctx.textAlign='center'; ctx.fillStyle='rgba(166,171,230,0.55)'; ctx.font='italic 700 11px "Chakra Petch", Inter, sans-serif'; ctx.fillText('CO₂  ppm',0,0); ctx.restore();
    ctx.textBaseline='top'; ctx.textAlign='center'; ctx.font='11px Inter, system-ui, sans-serif';
    for(var yr=1960; yr<=2026; yr+=10){ if(yr>Y1) break; var xx=xFor(yr); ctx.strokeStyle='rgba(166,171,230,0.08)'; ctx.beginPath(); ctx.moveTo(xx,pad.t); ctx.lineTo(xx,H-pad.b); ctx.stroke(); ctx.fillStyle='rgba(166,171,230,0.55)'; ctx.fillText(yr+'',xx,H-pad.b+8); }
    ctx.fillStyle='rgba(166,171,230,0.55)'; ctx.fillText('2026',xFor(2026)-4,H-pad.b+8);
  }

  function drawCurve(uptoYear){
    var grad=ctx.createLinearGradient(0,pad.t,0,H-pad.b); grad.addColorStop(0,colorWithAlpha(0.22)); grad.addColorStop(1,colorWithAlpha(0.02));
    ctx.beginPath(); var started=false,lastX=pad.l;
    for(var i=0;i<MONTHLY.length;i++){ var y=MONTHLY[i]; if(y>uptoYear+1e-6) break; var X=xFor(y),Y=yFor(co2(y)); if(!started){ctx.moveTo(X,Y);started=true;}else ctx.lineTo(X,Y); lastX=X; }
    if(started){ ctx.lineTo(lastX,H-pad.b); ctx.lineTo(pad.l,H-pad.b); ctx.closePath(); ctx.fillStyle=grad; ctx.fill(); }
    ctx.beginPath(); started=false;
    for(var j=0;j<MONTHLY.length;j++){ var y2=MONTHLY[j]; if(y2>uptoYear+1e-6) break; var X2=xFor(y2),Y2=yFor(co2(y2)); if(!started){ctx.moveTo(X2,Y2);started=true;}else ctx.lineTo(X2,Y2); }
    ctx.lineJoin='round'; ctx.lineCap='round'; ctx.lineWidth=2; ctx.strokeStyle=colorWithAlpha(0.95); ctx.shadowColor=colorWithAlpha(0.55); ctx.shadowBlur=8; ctx.stroke(); ctx.shadowBlur=0;
    ctx.beginPath();
    for(var k=Y0;k<=uptoYear+1e-6;k+=0.25){ var X3=xFor(k),Y3=yFor(baseline(k)); if(k===Y0) ctx.moveTo(X3,Y3); else ctx.lineTo(X3,Y3); }
    ctx.setLineDash([4,5]); ctx.lineWidth=1; ctx.strokeStyle='rgba(244,245,255,0.32)'; ctx.stroke(); ctx.setLineDash([]);
  }

  function drawAnnotations(uptoYear){
    ctx.font='italic 700 12px "Chakra Petch", Inter, sans-serif';
    for(var i=0;i<ANN.length;i++){ var a=ANN[i]; if(a.y>uptoYear+0.01) continue; var X=xFor(a.y),Y=yFor(baseline(a.y));
      ctx.beginPath(); ctx.arc(X,Y,3.2,0,Math.PI*2); ctx.fillStyle='#f4f5ff'; ctx.fill();
      ctx.beginPath(); ctx.arc(X,Y,5.6,0,Math.PI*2); ctx.strokeStyle=colorWithAlpha(0.6); ctx.lineWidth=1.4; ctx.stroke();
      var tx=(a.y<=1960)?X+10:X-10; var align=(a.y<=1960)?'left':'right'; ctx.textAlign=align; ctx.textBaseline='alphabetic';
      ctx.fillStyle='#f4f5ff'; ctx.fillText(a.label,tx,Y-12);
      ctx.font='11px Inter, sans-serif'; ctx.fillStyle='rgba(166,171,230,0.7)'; ctx.fillText(a.sub,tx,Y+2);
      ctx.font='italic 700 12px "Chakra Petch", Inter, sans-serif';
    }
  }

  function drawScrub(uptoYear){
    var sy=Math.min(scrubYear,uptoYear); if(sy<Y0) sy=Y0; var X=xFor(sy),p=co2(sy),Y=yFor(p);
    ctx.beginPath(); ctx.moveTo(X,pad.t); ctx.lineTo(X,H-pad.b); ctx.strokeStyle=colorWithAlpha(0.35); ctx.lineWidth=1; ctx.setLineDash([3,4]); ctx.stroke(); ctx.setLineDash([]);
    ctx.beginPath(); ctx.arc(X,Y,4.5,0,Math.PI*2); ctx.fillStyle=colorWithAlpha(1); ctx.fill();
    ctx.beginPath(); ctx.arc(X,Y,4.5,0,Math.PI*2); ctx.strokeStyle='#050314'; ctx.lineWidth=1.5; ctx.stroke();
    return {sy:sy,p:p};
  }

  function updateReadout(sy,p){ rYear.textContent=fmtYear(sy); rPpm.textContent=p.toFixed(1); var rise=(p-co2(1960)); if(Math.abs(sy-2026)<0.02) rNote.textContent='latest'; else rNote.textContent='+'+rise.toFixed(0)+' ppm since 1960'; }

  function render(){ ctx.clearRect(0,0,W,H); drawGrid(); drawCurve(drawTo); drawAnnotations(drawTo); var s=drawScrub(drawTo); updateReadout(s.sy,s.p); }

  var raf=null;
  function frame(ts){ readAccent(); if(animating){ if(!animStart) animStart=ts; var t=Math.min(1,(ts-animStart)/animDur); var e=1-Math.pow(1-t,3); drawTo=Y0+e*SPAN; if(t>=1){ animating=false; drawTo=Y1; } } render(); if(animating || !reduce) raf=requestAnimationFrame(frame); }

  function yearFromClientX(cx){ var r=canvas.getBoundingClientRect(); var x=cx-r.left; var fr=(x-pad.l)/(W-pad.l-pad.r); fr=Math.max(0,Math.min(1,fr)); return Y0+fr*SPAN; }
  function onMove(cx){ scrubYear=yearFromClientX(cx); range.value=String(scrubYear); if(reduce) render(); }
  canvas.addEventListener('mousemove',function(e){ onMove(e.clientX); });
  canvas.addEventListener('touchstart',function(e){ if(e.touches[0]){ onMove(e.touches[0].clientX);} },{passive:true});
  canvas.addEventListener('touchmove',function(e){ if(e.touches[0]){ onMove(e.touches[0].clientX); e.preventDefault();} },{passive:false});
  range.addEventListener('input',function(){ scrubYear=parseFloat(range.value); if(reduce) render(); });
  replayBtn.addEventListener('click',function(){ if(reduce){ drawTo=Y1; scrubYear=Y1; range.value=String(Y1); render(); return; } animating=true; animStart=0; drawTo=Y0; if(!raf) raf=requestAnimationFrame(frame); });
  seasonBtn.addEventListener('click',function(){ seasonOn=!seasonOn; seasonBtn.classList.toggle('is-on',seasonOn); seasonBtn.setAttribute('aria-pressed',seasonOn?'true':'false'); if(reduce) render(); });

  var rt=null;
  function onResize(){ if(rt) clearTimeout(rt); rt=setTimeout(function(){ resize(); render(); },120); }
  window.addEventListener('resize',onResize);
