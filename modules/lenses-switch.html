    prev=current; current=idx; t0=performance.now();
    for(var i=0;i<btns.length;i++){ btns[i].setAttribute('aria-selected', i===idx?'true':'false'); }
    var a=LENSES[idx].accent;
    root.style.setProperty('--kls-accent', a[0]+','+a[1]+','+a[2]);
    capTitle.textContent=LENSES[idx].label;
    capSub.textContent=LENSES[idx].sub;
    if(reduce){ resize(); frame(performance.now()); }
  }

  for(var b=0;b<btns.length;b++){
    (function(k){ btns[k].addEventListener('click',function(){select(k);}); })(b);
  }
  window.addEventListener('resize',function(){ resize(); if(reduce) frame(performance.now()); });

  resize();
  if(reduce){ mix=1; frame(performance.now()); }
  else { raf=requestAnimationFrame(frame); }
})();
</script>
