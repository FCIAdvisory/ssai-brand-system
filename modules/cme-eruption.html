<script>
(function(){
  var root=document.getElementById('kit-cme-eruption');
  if(!root)return;
  var canvas=root.querySelector('.cme-canvas');
  var ctx=canvas.getContext('2d');
  var slider=root.querySelector('.cme-slider');
  var eruptBtn=root.querySelector('.cme-erupt');
  var elSpeed=root.querySelector('[data-cme="speed"]');
  var elEta=root.querySelector('[data-cme="eta"]');
  var elKp=root.querySelector('[data-cme="kp"]');
  var elKpState=root.querySelector('[data-cme="kpstate"]');
  var elKpBar=root.querySelector('[data-cme="kpbar"]');

  function accent(){
    var a=getComputedStyle(document.documentElement).getPropertyValue('--accent').trim();
    return a||'#7fb2ff';
  }
  var ACC=accent();
  function hexToRgb(h){
    h=h.replace('#','');
    if(h.length===3)h=h[0]+h[0]+h[1]+h[1]+h[2]+h[2];
    var n=parseInt(h,16);
    if(isNaN(n))return [127,178,255];
    return [(n>>16)&255,(n>>8)&255,n&255];
  }
  var ACCRGB=hexToRgb(ACC);
  function acc(a){return 'rgba('+ACCRGB[0]+','+ACCRGB[1]+','+ACCRGB[2]+','+a+')';}

  var sunImg=new Image(); var sunReady=false;
  sunImg.onload=function(){sunReady=true;};
  sunImg.src='../assets/images/sun-flare-gold-sdo.jpg';
  var earthImg=new Image(); var earthReady=false;
  earthImg.onload=function(){earthReady=true;};
  earthImg.src='../assets/images/planets/earth.jpg';

  var W=0,H=0,DPR=1;
  function resize(){
    var r=root.getBoundingClientRect();
    W=Math.max(1,r.width); H=Math.max(1,r.height);
    DPR=Math.min(window.devicePixelRatio||1,2);
    canvas.width=Math.round(W*DPR);
    canvas.height=Math.round(H*DPR);
    ctx.setTransform(DPR,0,0,DPR,0,0);
  }

  var stars=[];
  function buildStars(){
    stars=[];
    for(var i=0;i<160;i++){
      stars.push({x:Math.random(),y:Math.random(),r:Math.random()*1.3+.2,tw:Math.random()*Math.PI*2,sp:.4+Math.random()*1.2});
    }
  }
  buildStars();

  var SUNX=0,SUNY=0,SUNR=0,EX=0,EY=0,ER=0;
  function layout(){
    SUNX=W*0.20; SUNY=H*0.50; SUNR=Math.min(W*0.24,H*0.46);
    EX=W*0.84; EY=H*0.46; ER=Math.max(22,Math.min(W*0.055,H*0.11));
  }

  var particles=[];
  var cme={active:false,t:0,launchX:0,launchY:0,dirX:1,dirY:0,arrived:false,speed:1200,travel:0};
  var kp=2.0, kpTarget=2.0;
  var flash=0;
  var compress=0;
  var autoTimer=0, autoDelay=5.2;
  var shimmer=0;

  function speedToTravel(s){
    var tmin=2.4, tmax=8.5;
    var f=(s-300)/(3000-300);
    return tmax-(tmax-tmin)*f;
  }
  function speedToEta(s){ return (149600000/s)/3600; }

  function setSpeedUI(){
    var s=parseFloat(slider.value);
    elSpeed.textContent=Math.round(s);
    elEta.textContent=speedToEta(s).toFixed(1);
  }

  function launch(){
    if(cme.active)return;
    layout();
    var s=parseFloat(slider.value);
    cme.active=true; cme.t=0; cme.arrived=false;
    cme.speed=s;
    cme.travel=speedToTravel(s);
    cme.launchX=SUNX+SUNR*0.62; cme.launchY=SUNY+(Math.random()*2-1)*SUNR*0.18;
    var dx=EX-cme.launchX, dy=EY-cme.launchY, d=Math.hypot(dx,dy)||1;
    cme.dirX=dx/d; cme.dirY=dy/d;
    particles=[];
    var count=260;
    var ang0=Math.atan2(cme.dirY,cme.dirX);
    for(var i=0;i<count;i++){
      var spread=(Math.random()*2-1)*0.5;
      var a=ang0+spread;
      var sp=(0.55+Math.random()*0.9);
      var sz=2+Math.random()*Math.random()*9;
      var lag=Math.random()*0.16;
      particles.push({
        bx:cme.launchX+Math.cos(a)*SUNR*0.12*Math.random(),
        by:cme.launchY+Math.sin(a)*SUNR*0.12*Math.random(),
        a:a, sp:sp, size:sz, lag:lag,
        wob:Math.random()*Math.PI*2, wsp:0.6+Math.random()*1.4,
        hue:Math.random()
      });
    }
    autoTimer=0;
  }

  setSpeedUI();
  slider.addEventListener('input',setSpeedUI);
  eruptBtn.addEventListener('click',function(){ if(!cme.active)launch(); });

  function drawStars(time){
    for(var i=0;i<stars.length;i++){
      var s=stars[i];
      var tw=0.4+0.6*Math.abs(Math.sin(time*0.001*s.sp+s.tw));
      ctx.globalAlpha=tw*0.7;
      ctx.fillStyle='#dfe6ff';
      ctx.beginPath();
      ctx.arc(s.x*W,s.y*H,s.r,0,Math.PI*2);
      ctx.fill();
    }
    ctx.globalAlpha=1;
  }

  function drawSun(){
    shimmer+=0.016;
    var bloomR=SUNR*2.3;
    var g=ctx.createRadialGradient(SUNX,SUNY,SUNR*0.5,SUNX,SUNY,bloomR);
    g.addColorStop(0,'rgba(255,196,110,0.55)');
    g.addColorStop(0.28,'rgba(255,150,60,0.30)');
    g.addColorStop(0.6,'rgba(220,90,40,0.12)');
    g.addColorStop(1,'rgba(120,40,20,0)');
    ctx.fillStyle=g;
    ctx.beginPath();ctx.arc(SUNX,SUNY,bloomR,0,Math.PI*2);ctx.fill();

    var pulse=1+Math.sin(shimmer*1.3)*0.02;
    ctx.save();
    ctx.beginPath();ctx.arc(SUNX,SUNY,SUNR,0,Math.PI*2);ctx.clip();
    if(sunReady){
      var sw=SUNR*2*pulse, sh=SUNR*2*pulse;
      var ox=Math.sin(shimmer*0.4)*SUNR*0.015;
      var oy=Math.cos(shimmer*0.35)*SUNR*0.015;
      ctx.globalAlpha=1;
      ctx.drawImage(sunImg,SUNX-sw/2+ox,SUNY-sh/2+oy,sw,sh);
      ctx.globalCompositeOperation='overlay';
      var sg=ctx.createRadialGradient(SUNX-SUNR*0.3,SUNY-SUNR*0.3,SUNR*0.1,SUNX,SUNY,SUNR);
      sg.addColorStop(0,'rgba(255,240,200,'+(0.18+0.06*Math.sin(shimmer*1.7))+')');
      sg.addColorStop(1,'rgba(80,20,0,0.25)');
      ctx.fillStyle=sg;
      ctx.beginPath();ctx.arc(SUNX,SUNY,SUNR,0,Math.PI*2);ctx.fill();
      ctx.globalCompositeOperation='source-over';
    }else{
      var fg=ctx.createRadialGradient(SUNX-SUNR*0.3,SUNY-SUNR*0.3,SUNR*0.1,SUNX,SUNY,SUNR);
      fg.addColorStop(0,'#fff3d6');
      fg.addColorStop(0.5,'#ffb000');
      fg.addColorStop(1,'#c2440c');
      ctx.fillStyle=fg;
      ctx.beginPath();ctx.arc(SUNX,SUNY,SUNR,0,Math.PI*2);ctx.fill();
    }
    ctx.restore();

    ctx.globalCompositeOperation='lighter';
    var rim=ctx.createRadialGradient(SUNX,SUNY,SUNR*0.86,SUNX,SUNY,SUNR*1.08);
    rim.addColorStop(0,'rgba(255,180,90,0)');
    rim.addColorStop(0.7,'rgba(255,170,80,0.25)');
    rim.addColorStop(1,'rgba(255,120,40,0)');
    ctx.fillStyle=rim;
    ctx.beginPath();ctx.arc(SUNX,SUNY,SUNR*1.08,0,Math.PI*2);ctx.fill();
    ctx.globalCompositeOperation='source-over';
  }

  function drawMagnetosphere(time){
    var comp=compress;
    var sunwardBase=ER*2.6;
    var sunward=sunwardBase*(1-comp*0.45);
    var tail=ER*7.5*(1+comp*0.4);
    var puff=1+Math.sin(time*0.0016)*0.02;

    ctx.save();
    ctx.translate(EX,EY);
    ctx.lineWidth=1.4;
    var loops=5;
    for(var i=1;i<=loops;i++){
      var scale=i/loops;
      var rx=(sunward*0.55+ (sunward*1.4)*scale)*puff;
      var topY=ER*(0.55+scale*2.5)*puff;
      ctx.strokeStyle=acc(0.10+0.16*(1-scale)+flash*0.35);
      ctx.beginPath();
      ctx.moveTo(-ER*0.2,-ER*0.3);
      ctx.bezierCurveTo(-rx,-topY*0.4, -rx*0.4,-topY, ER*0.3,-topY*0.55);
      ctx.bezierCurveTo(rx*0.5,-topY*0.3, tail*scale*0.5,-ER*0.4, tail*scale,-ER*0.15);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(-ER*0.2,ER*0.3);
      ctx.bezierCurveTo(-rx,topY*0.4, -rx*0.4,topY, ER*0.3,topY*0.55);
      ctx.bezierCurveTo(rx*0.5,topY*0.3, tail*scale*0.5,ER*0.4, tail*scale,ER*0.15);
      ctx.stroke();
    }

    var standoff=sunward*puff;
    ctx.globalCompositeOperation='lighter';
    var bs=ctx.createLinearGradient(-standoff*1.5,0,-ER,0);
    bs.addColorStop(0,acc(0));
    bs.addColorStop(1,acc(0.42+flash*0.5+comp*0.35));
    ctx.strokeStyle=bs;
    ctx.lineWidth=2.4+comp*2.6;
    ctx.beginPath();
    var H2=ER*5.0*puff;
    ctx.moveTo(-standoff*0.55, -H2);
    ctx.quadraticCurveTo(-standoff*1.75,0, -standoff*0.55, H2);
    ctx.stroke();
    var shg=ctx.createRadialGradient(-standoff,0,ER*0.5,-standoff,0,standoff*1.3);
    shg.addColorStop(0,acc(0.10+comp*0.18+flash*0.25));
    shg.addColorStop(1,acc(0));
    ctx.fillStyle=shg;
    ctx.beginPath();
    ctx.moveTo(-standoff*0.55,-H2);
    ctx.quadraticCurveTo(-standoff*1.75,0,-standoff*0.55,H2);
    ctx.quadraticCurveTo(-ER,0,-standoff*0.55,-H2);
    ctx.fill();
    ctx.globalCompositeOperation='source-over';
    ctx.restore();

    ctx.save();
    ctx.beginPath();ctx.arc(EX,EY,ER,0,Math.PI*2);ctx.clip();
    if(earthReady){
      ctx.drawImage(earthImg,EX-ER,EY-ER,ER*2,ER*2);
    }else{
      var eg=ctx.createRadialGradient(EX-ER*0.3,EY-ER*0.3,ER*0.1,EX,EY,ER);
      eg.addColorStop(0,'#5aa6e0');
      eg.addColorStop(0.6,'#1f5a9c');
      eg.addColorStop(1,'#0a2747');
      ctx.fillStyle=eg;
      ctx.beginPath();ctx.arc(EX,EY,ER,0,Math.PI*2);ctx.fill();
    }
    var term=ctx.createLinearGradient(EX-ER,EY,EX+ER,EY);
    term.addColorStop(0,'rgba(0,0,0,0)');
    term.addColorStop(0.55,'rgba(2,3,14,0.15)');
    term.addColorStop(1,'rgba(2,3,14,0.78)');
    ctx.fillStyle=term;
    ctx.fillRect(EX-ER,EY-ER,ER*2,ER*2);
    ctx.restore();

    ctx.globalCompositeOperation='lighter';
    var lg=ctx.createRadialGradient(EX-ER*0.4,EY,ER*0.6,EX-ER*0.4,EY,ER*1.5);
    lg.addColorStop(0,'rgba(150,200,255,0)');
    lg.addColorStop(0.7,acc(0.10));
    lg.addColorStop(1,'rgba(150,200,255,0)');
    ctx.fillStyle=lg;
    ctx.beginPath();ctx.arc(EX,EY,ER*1.5,0,Math.PI*2);ctx.fill();

    if(flash>0.01){
      var ar=ctx.createRadialGradient(EX,EY,ER*0.6,EX,EY,ER*(1.6+flash*1.2));
      ar.addColorStop(0,'rgba(120,255,180,0)');
      ar.addColorStop(0.55,'rgba(110,255,170,'+(0.35*flash)+')');
      ar.addColorStop(0.8,acc(0.4*flash));
      ar.addColorStop(1,'rgba(120,255,180,0)');
      ctx.fillStyle=ar;
      ctx.beginPath();ctx.arc(EX,EY,ER*(1.6+flash*1.2),0,Math.PI*2);ctx.fill();
      ctx.fillStyle='rgba(120,255,180,'+(0.5*flash)+')';
      ctx.beginPath();ctx.ellipse(EX,EY-ER*0.85,ER*0.6,ER*0.22,0,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.ellipse(EX,EY+ER*0.85,ER*0.6,ER*0.22,0,0,Math.PI*2);ctx.fill();
    }
    ctx.globalCompositeOperation='source-over';
  }

  function updateCME(dt){
    if(!cme.active)return;
    cme.t+=dt/cme.travel;
    if(cme.t>=1 && !cme.arrived){
      cme.arrived=true;
      flash=1; compress=1;
      var s=cme.speed;
      kpTarget=Math.min(9,2.0+ (s-300)/(3000-300)*7.2);
    }
    if(cme.t>=1.6){ cme.active=false; particles=[]; }
  }

  function drawParticles(dt){
    if(!particles.length)return;
    var dx=EX-cme.launchX, dy=EY-cme.launchY;
    var dist=Math.hypot(dx,dy)||1;
    ctx.globalCompositeOperation='lighter';
    for(var i=0;i<particles.length;i++){
      var p=particles[i];
      var pr=cme.t - p.lag;
      if(pr<0)continue;
      var prc=Math.min(pr,1.15);
      p.wob+=p.wsp*dt;
      var along=prc*dist*p.sp;
      var px=p.bx+Math.cos(p.a)*along + Math.cos(p.wob)*p.size*1.5*(1+prc*2);
      var py=p.by+Math.sin(p.a)*along + Math.sin(p.wob*1.1)*p.size*1.5*(1+prc*2);
      var fade=1;
      if(pr>1) fade=Math.max(0,1-(pr-1)*4);
      if(pr<0.08) fade=pr/0.08;
      var sizeGrow=p.size*(1+prc*1.6);
      var r,gg,b;
      var near=Math.min(1,prc*1.1);
      if(p.hue<0.5){ r=255; gg=170+50*(1-near); b=70+120*near; }
      else { r=255; gg=130+60*(1-near); b=50+150*near; }
      var pg=ctx.createRadialGradient(px,py,0,px,py,sizeGrow*2.4);
      pg.addColorStop(0,'rgba('+r+','+gg+','+b+','+(0.7*fade)+')');
      pg.addColorStop(0.4,'rgba('+r+','+Math.max(60,gg-60)+','+Math.min(120,b)+','+(0.32*fade)+')');
      pg.addColorStop(1,'rgba(120,40,20,0)');
      ctx.fillStyle=pg;
      ctx.beginPath();ctx.arc(px,py,sizeGrow*2.4,0,Math.PI*2);ctx.fill();
    }
    ctx.globalCompositeOperation='source-over';
  }

  function updateKp(dt){
    kp+=(kpTarget-kp)*Math.min(1,dt*1.8);
    if(!cme.active){ kpTarget+=(2.0-kpTarget)*Math.min(1,dt*0.22); }
    var disp=kp;
    elKp.textContent=disp.toFixed(1);
    var pct=Math.max(0,Math.min(1,disp/9));
    elKpBar.style.width=(8+pct*92)+'%';
    var st='quiet',col=acc(1);
    if(disp>=5){st='G-storm';col='#ff5a4a';}
    else if(disp>=4){st='active';col='#ffb84a';}
    else if(disp>=3){st='unsettled';col='#9fd0ff';}
    elKpState.textContent=st;
    elKpState.style.color=col;
  }

  var last=performance.now();
  function frame(now){
    var dt=Math.min(0.05,(now-last)/1000); last=now;

    if(!cme.active){
      autoTimer+=dt;
      if(autoTimer>=autoDelay){ launch(); }
    }
    updateCME(dt);
    flash+=(0-flash)*Math.min(1,dt*1.6);
    if(!cme.active||cme.arrived){ compress+=(0-compress)*Math.min(1,dt*0.55); }
    updateKp(dt);

    ctx.clearRect(0,0,W,H);
    var bg=ctx.createRadialGradient(W*0.20,H*0.5,SUNR*0.4,W*0.5,H*0.5,Math.max(W,H));
    bg.addColorStop(0,'rgba(40,18,8,0.35)');
    bg.addColorStop(0.45,'rgba(10,6,24,0.0)');
    bg.addColorStop(1,'rgba(3,2,12,0.55)');
    ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);

    drawStars(now);
    drawSun();
    drawParticles(dt);
    drawMagnetosphere(now);

    if(flash>0.02){
      ctx.globalCompositeOperation='lighter';
      ctx.fillStyle='rgba(120,255,190,'+(0.05*flash)+')';
      ctx.fillRect(0,0,W,H);
      ctx.globalCompositeOperation='source-over';
    }

    requestAnimationFrame(frame);
  }

  resize(); layout();
  requestAnimationFrame(frame);

  var ro=new ResizeObserver(function(){ resize(); layout(); });
  ro.observe(root);
  window.addEventListener('resize',function(){ resize(); layout(); });
})();
</script>
</body></html>
