<script>
(function(){
  var root=document.getElementById('kit-hyperspace-warp');
  if(!root||root.dataset.hwInit)return;root.dataset.hwInit='1';
  var canvas=root.querySelector('.hw-canvas');
  var ctx=canvas.getContext('2d',{alpha:false});
  var slider=root.querySelector('.hw-slider');
  var elBeta=root.querySelector('[data-hw="beta"]');
  var elGamma=root.querySelector('[data-hw="gamma"]');
  var elBlue=root.querySelector('[data-hw="blue"]');
  var elBetaLabel=root.querySelector('[data-hw="betalabel"]');

  var accent=getComputedStyle(document.documentElement).getPropertyValue('--accent').trim()||'#7aa8ff';

  function hexToRgb(h){
    h=(h||'').trim();
    var m=/^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(h);
    if(m)return[parseInt(m[1],16),parseInt(m[2],16),parseInt(m[3],16)];
    var s=/^#?([a-f\d])([a-f\d])([a-f\d])$/i.exec(h);
    if(s)return[parseInt(s[1]+s[1],16),parseInt(s[2]+s[2],16),parseInt(s[3]+s[3],16)];
    var rg=/rgba?\(([^)]+)\)/i.exec(h);
    if(rg){var p=rg[1].split(',');return[+p[0]||0,+p[1]||0,+p[2]||0];}
    return[122,168,255];
  }
  var accRGB=hexToRgb(accent);

  var W=0,H=0,DPR=1,CX=0,CY=0,maxR=1;

  var STAR_TARGET=580;
  var stars=[];
  function rand(a,b){return a+Math.random()*(b-a);}
  function makeStar(){
    return{
      x:rand(-1,1),
      y:rand(-1,1),
      z:rand(0.06,1),
      seed:Math.random(),
      baseSize:rand(0.55,1.7),
      tw:rand(0,Math.PI*2),
      twSpd:rand(0.6,2.0),
      hue:rand(0,1)
    };
  }
  function seedStars(){stars.length=0;for(var i=0;i<STAR_TARGET;i++)stars.push(makeStar());}
  seedStars();

  function resize(){
    var r=root.getBoundingClientRect();
    var cw=Math.max(1,Math.round(r.width));
    var ch=Math.max(1,Math.round(r.height));
    DPR=Math.min(window.devicePixelRatio||1,2.5);
    canvas.width=Math.round(cw*DPR);
    canvas.height=Math.round(ch*DPR);
    canvas.style.width=cw+'px';canvas.style.height=ch+'px';
    ctx.setTransform(DPR,0,0,DPR,0,0);
    W=cw;H=ch;CX=W*0.5;CY=H*0.5;
    maxR=Math.sqrt(CX*CX+CY*CY);
  }

  var ro=new ResizeObserver(function(){resize();});
  ro.observe(root);
  window.addEventListener('resize',resize);
  resize();

  var beta=0.25;
  var userBeta=null;
  var lastInteract=-1e9;
  var breatheActive=true;

  function readSlider(){
    var v=+slider.value/1000;
    if(v>0.999)v=0.999;
    return v;
  }
  function setSliderFill(b){
    slider.style.setProperty('--hw-fill',(b*100).toFixed(1)+'%');
  }
  slider.addEventListener('input',function(){
    userBeta=readSlider();
    lastInteract=performance.now();
    breatheActive=false;
    setSliderFill(userBeta);
  });

  setSliderFill(beta);

  var bgGrad=null,bgKey='';
  function ensureBg(){
    var k=W+'x'+H;
    if(k===bgKey&&bgGrad)return;
    bgKey=k;
    bgGrad=ctx.createRadialGradient(CX,CY,0,CX,CY,maxR);
    bgGrad.addColorStop(0,'#0a0726');
    bgGrad.addColorStop(0.45,'#070420');
    bgGrad.addColorStop(1,'#040210');
  }

  function clamp(v,a,b){return v<a?a:v>b?b:v;}
  function lerp(a,b,t){return a+(b-a)*t;}

  var t0=performance.now();
  var driftZ=0;

  function frame(now){
    var dt=Math.min(0.05,(now-(frame._last||now))/1000);
    frame._last=now;
    var t=(now-t0)/1000;

    if(breatheActive){
      beta=0.25+0.14*Math.sin(t*0.22)+0.05*Math.sin(t*0.071+1.3);
      beta=clamp(beta,0.02,0.999);
      slider.value=Math.round(beta*1000);
      setSliderFill(beta);
    }else{
      beta+=(userBeta-beta)*Math.min(1,dt*7);
      if(now-lastInteract>9000){breatheActive=true;}
    }

    var gamma=1/Math.sqrt(Math.max(1e-6,1-beta*beta));
    var bluePct=Math.round((Math.sqrt((1+beta)/(1-beta))-1)*100);

    elBeta.textContent=beta.toFixed(3);
    elGamma.textContent=gamma.toFixed(gamma<10?3:1);
    elBlue.textContent=bluePct;
    elBetaLabel.textContent=beta.toFixed(3)+' c';

    var travel=(0.10+beta*beta*1.7)*dt;
    driftZ+=travel*0.4;

    ensureBg();

    ctx.globalCompositeOperation='source-over';
    ctx.fillStyle=bgGrad;
    ctx.fillRect(0,0,W,H);

    var nebA=0.05+0.04*Math.sin(t*0.15);
    var ng=ctx.createRadialGradient(CX+Math.cos(t*0.05)*W*0.12,CY+Math.sin(t*0.07)*H*0.1,0,CX,CY,maxR*0.85);
    ng.addColorStop(0,'rgba('+accRGB[0]+','+accRGB[1]+','+accRGB[2]+','+(nebA*1.1).toFixed(3)+')');
    ng.addColorStop(0.5,'rgba('+Math.round(accRGB[0]*0.5)+','+Math.round(accRGB[1]*0.4)+',120,'+(nebA*0.5).toFixed(3)+')');
    ng.addColorStop(1,'rgba(5,3,20,0)');
    ctx.fillStyle=ng;
    ctx.fillRect(0,0,W,H);

    var fov=Math.min(W,H)*0.62;

    var aber=beta;
    var streakK=beta*beta;

    ctx.globalCompositeOperation='lighter';

    for(var i=0;i<stars.length;i++){
      var s=stars[i];
      s.z-=travel*(0.35+s.z*0.5);
      if(s.z<=0.02){
        s.x=rand(-1,1);s.y=rand(-1,1);s.z=rand(0.85,1.05);
        s.seed=Math.random();s.baseSize=rand(0.55,1.7);
        s.tw=rand(0,Math.PI*2);s.twSpd=rand(0.6,2.0);s.hue=rand(0,1);
      }

      var ang=Math.atan2(s.y,s.x);
      var rad=Math.sqrt(s.x*s.x+s.y*s.y);
      var radA=Math.pow(rad,1+aber*1.35);
      var px=Math.cos(ang)*radA;
      var py=Math.sin(ang)*radA;

      var invz=1/s.z;
      var sx=CX+px*fov*invz;
      var sy=CY+py*fov*invz;

      var dx=sx-CX,dy=sy-CY;
      var dist=Math.sqrt(dx*dx+dy*dy)||0.0001;
      var distN=dist/maxR;

      var depthFade=clamp((1.05-s.z)*1.3,0,1);
      var twk=0.7+0.3*Math.sin(s.tw+t*s.twSpd);
      var bright=depthFade*twk*invz*0.55;
      bright=clamp(bright,0,1);

      var size=s.baseSize*invz*(0.7+depthFade*0.6);
      size=clamp(size,0.35,3.4);

      var dirx=dx/dist,diry=dy/dist;
      var streakLen=streakK*invz*Math.pow(distN,0.65)*Math.min(W,H)*0.9;
      streakLen=clamp(streakLen,0,maxR*1.25);

      var fwd=clamp(1-distN,0,1);
      var dop=fwd*beta;
      var r,g,b;
      var warm=s.hue;
      if(dop>0.001){
        var blu=clamp(dop*2.0,0,1);
        r=lerp(lerp(255,205,warm*0.4),150,blu);
        g=lerp(lerp(230,225,warm*0.3),200,blu*0.6);
        b=lerp(lerp(210,180,warm),255,blu);
      }else{
        var redAmt=clamp((distN-0.55)*1.6,0,1)*beta;
        r=lerp(255,255,1);
        g=lerp(238,150,redAmt);
        b=lerp(225,120,redAmt);
      }

      if(streakLen>1.2){
        var ex=sx,ey=sy;
        var bx=sx-dirx*streakLen,by=sy-diry*streakLen;
        var lg=ctx.createLinearGradient(bx,by,ex,ey);
        var aHead=bright*(0.45+0.5*streakK);
        lg.addColorStop(0,'rgba('+(r|0)+','+(g|0)+','+(b|0)+',0)');
        lg.addColorStop(0.65,'rgba('+(r|0)+','+(g|0)+','+(b|0)+','+(aHead*0.4).toFixed(3)+')');
        lg.addColorStop(1,'rgba('+(r|0)+','+(g|0)+','+(b|0)+','+aHead.toFixed(3)+')');
        ctx.strokeStyle=lg;
        ctx.lineWidth=clamp(size*0.85,0.5,2.6);
        ctx.lineCap='round';
        ctx.beginPath();
        ctx.moveTo(bx,by);
        ctx.lineTo(ex,ey);
        ctx.stroke();
      }

      var glowA=bright*(1-0.55*streakK);
      if(glowA>0.01){
        var gr=size*2.6;
        var rg2=ctx.createRadialGradient(sx,sy,0,sx,sy,gr);
        rg2.addColorStop(0,'rgba('+(r|0)+','+(g|0)+','+(b|0)+','+clamp(glowA,0,1).toFixed(3)+')');
        rg2.addColorStop(0.4,'rgba('+(r|0)+','+(g|0)+','+(b|0)+','+(glowA*0.35).toFixed(3)+')');
        rg2.addColorStop(1,'rgba('+(r|0)+','+(g|0)+','+(b|0)+',0)');
        ctx.fillStyle=rg2;
        ctx.beginPath();
        ctx.arc(sx,sy,gr,0,Math.PI*2);
        ctx.fill();

        ctx.fillStyle='rgba('+Math.min(255,r+30|0)+','+Math.min(255,g+30|0)+','+Math.min(255,b+30|0)+','+clamp(glowA*1.1,0,1).toFixed(3)+')';
        ctx.beginPath();
        ctx.arc(sx,sy,Math.max(0.4,size*0.5),0,Math.PI*2);
        ctx.fill();
      }
    }

    var coreA=0.10+streakK*0.5;
    var cr=Math.min(W,H)*(0.04+streakK*0.16);
    var cg=ctx.createRadialGradient(CX,CY,0,CX,CY,cr);
    cg.addColorStop(0,'rgba(220,232,255,'+clamp(coreA,0,0.7).toFixed(3)+')');
    cg.addColorStop(0.4,'rgba('+accRGB[0]+','+accRGB[1]+','+accRGB[2]+','+(coreA*0.5).toFixed(3)+')');
    cg.addColorStop(1,'rgba(5,3,20,0)');
    ctx.fillStyle=cg;
    ctx.beginPath();
    ctx.arc(CX,CY,cr,0,Math.PI*2);
    ctx.fill();

    ctx.globalCompositeOperation='source-over';
    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
})();
</script>
</body></html>
